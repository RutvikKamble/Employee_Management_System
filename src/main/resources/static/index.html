<!DOCTYPE html>
<html lang="en">
<head>
    <title>Employee Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="header">
        <h1>Employee Details</h1>

        <input type="text" id="searchInput" placeholder="Search by name..." onkeyup="filterEmployees()" />

        <button onclick="toggleForm()">Add Employee</button>
    </div>

    <!-- TABLE -->
    <div class="table-container">
        <table>
            <thead>
            <tr>
                <th>Id</th>
                <th>Name</th>
                <th>Designation</th>
                <th>Joining Date</th>
                <th>Salary</th>
                <th>Address</th>
                <th>Mobile</th>
                <th>Gender</th>
                <th>City</th>
                <th>State</th>
                <th>Country</th>
                <th>Type</th>
            </tr>
            </thead>

            <tbody id="employeeTableBody">
            <!-- Data comes here -->
            </tbody>
        </table>
    </div>

<div class="action-buttons">
    <button id="updateBtn" disabled>Update</button>
    <button id="deleteBtn" disabled>Delete</button>
</div>

<!-- FORM -->
<div id="formModal" class="modal">
    <div class="modal-content">

        <h2>Add Employee</h2>

        <form id="employeeForm">

            <div class="form-grid">

                <div>
                    <label>Name</label>
                    <input type="text" id="employeeName" required>
                </div>

                <div>
                    <label>Designation</label>
                    <input type="text" id="designation">
                </div>

                <div>
                    <label>Joining Date</label>
                    <input type="date" id="joiningDate">
                </div>

                <div>
                    <label>Salary</label>
                    <input type="number" id="salary">
                </div>

                <div>
                    <label>Address</label>
                    <input type="text" id="address">
                </div>

                <div>
                    <label>Mobile No</label>
                    <input type="text" id="mobileNo">
                </div>

                <div>
                    <label>Gender</label>
                    <select id="gender">
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>

                <div>
                    <label>City</label>
                    <input type="text" id="city">
                </div>

                <div>
                    <label>State</label>
                    <input type="text" id="state">
                </div>

                <div>
                    <label>Country</label>
                    <input type="text" id="country">
                </div>

                <div>
                    <label>Employee Type</label>
                    <select id="employeeType">
                        <option>Intern</option>
                        <option>Full Time</option>
                        <option>Contract</option>
                        <option>Part Time</option>
                    </select>
                </div>

            </div>

            <div class="form-footer">
                <button type="submit">Submit</button>
                <button type="button" onclick="toggleForm()">Close</button>
            </div>

        </form>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
